<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TC Roßbach - Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --tcr-blue-dark: #0f2d52;
            --tcr-blue-light: #1d4e89;
            --tcr-yellow: #d9ff00;
        }
        body { 
            user-select: none; 
            -webkit-tap-highlight-color: transparent; 
            touch-action: manipulation;
            background-color: var(--tcr-blue-dark);
        }
        .bg-tcr-blue { background-color: var(--tcr-blue-light); }
        .text-tcr-blue { color: var(--tcr-blue-light); }
        .active-scale:active { transform: scale(0.96); transition: 0.1s; }
        
        .bg-gradient-main {
            background: radial-gradient(circle at center, #1e4b85 0%, #0a1f3d 100%);
        }
    </style>
</head>
<body class="h-screen flex flex-col font-sans overflow-hidden bg-gradient-main text-slate-900">

<script>
    // DEINE SUPABASE KONFIGURATION
    const SB_URL = "https://pincsrqnlikcalxofztq.supabase.co";
    const SB_KEY = "sb_publishable_AiIuTquIjZaBGvZnki6OpQ";
    const supabase = supabase.createClient(SB_URL, SB_KEY);
</script>

<div id="screen-home" class="flex-grow flex flex-col items-center justify-center p-6 text-white">
    
    <div class="mb-10 text-center bg-white p-8 rounded-[40px] shadow-[0_20px_50px_rgba(0,0,0,0.3)] border-b-8 border-tcr-yellow">
        <img src="Vereins-Logo.png" alt="TC Roßbach Logo" class="h-44 mx-auto">
    </div>

    <h1 class="text-2xl font-black tracking-[0.3em] uppercase mb-10 text-white/90 text-center">Clubhaus Terminal</h1>

    <div class="w-full max-w-md space-y-5">
        <button onclick="openDrinks()" class="active-scale w-full bg-white text-tcr-blue p-6 rounded-3xl shadow-2xl flex items-center justify-between border-l-8 border-tcr-yellow">
            <div class="flex items-center gap-5 text-left">
                <span class="text-4xl">🍺</span>
                <div>
                    <h2 class="text-2xl font-black uppercase text-tcr-blue leading-none">Getränke</h2>
                    <p class="text-slate-400 text-sm font-bold mt-1">Verzehr buchen</p>
                </div>
            </div>
            <span class="bg-tcr-blue text-white w-10 h-10 rounded-full flex items-center justify-center font-bold">→</span>
        </button>

        <div class="grid grid-cols-2 gap-4">
            <button onclick="openForm('UPDATE')" class="active-scale bg-white/10 backdrop-blur-md border border-white/20 text-white p-5 rounded-3xl shadow-xl flex flex-col items-center">
                <span class="text-3xl mb-2">📝</span>
                <span class="text-xs font-black uppercase tracking-widest text-center">Daten ändern</span>
            </button>

            <button onclick="openForm('NACHRICHT')" class="active-scale bg-white/10 backdrop-blur-md border border-white/20 text-white p-5 rounded-3xl shadow-xl flex flex-col items-center">
                <span class="text-3xl mb-2">📩</span>
                <span class="text-xs font-black uppercase tracking-widest text-center">Nachricht</span>
            </button>
        </div>
    </div>
    
    <p class="mt-12 text-white/30 text-[10px] uppercase tracking-[0.4em] font-bold">TC Roßbach e.V. • Westerwald</p>
</div>

<div id="screen-sub" class="hidden flex-grow flex flex-col p-4">
    <div class="flex justify-between items-center mb-4">
        <button onclick="location.reload()" class="bg-white/20 backdrop-blur text-white px-8 py-3 rounded-2xl shadow-lg font-black border border-white/30 active-scale uppercase tracking-tighter text-sm">← Abbrechen</button>
        <img src="Vereins-Logo.png" class="h-10 opacity-50 bg-white rounded-lg p-1">
    </div>
    
    <div id="sub-content" class="bg-white rounded-[40px] shadow-2xl p-8 flex-grow overflow-y-auto border-t-[12px] border-tcr-blue-light">
        </div>
</div>

<script>
let selectedMemberId = null;
let selectedMemberName = "";

// 1. MITGLIEDER-SUCHE (NUMMER ODER NAME)
function openDrinks() {
    document.getElementById('screen-home').classList.add('hidden');
    document.getElementById('screen-sub').classList.remove('hidden');
    document.getElementById('sub-content').innerHTML = `
        <h2 class="text-3xl font-black text-tcr-blue mb-2 uppercase tracking-tighter text-left">Mitglied wählen</h2>
        <p class="text-slate-400 mb-6 font-bold text-sm text-left">Gib deine Nummer oder deinen Namen ein:</p>
        <input type="text" id="mSearch" oninput="searchM(this.value)" placeholder="Nr. oder Name..." class="w-full p-6 bg-slate-100 border-2 border-slate-200 rounded-2xl text-2xl outline-none focus:border-tcr-blue shadow-inner text-tcr-blue font-bold">
        <div id="results" class="mt-6 grid grid-cols-1 gap-3"></div>
        <button onclick="selectM(null, 'Gast/Manuell')" class="mt-10 w-full text-slate-300 font-bold py-4 border-t border-dashed uppercase text-xs tracking-widest">Ich bin Gast / Nicht gelistet</button>
    `;
    setTimeout(() => document.getElementById('mSearch').focus(), 100);
}

async function searchM(q) {
    if(q.length < 1) {
        document.getElementById('results').innerHTML = '';
        return;
    }

    const isNumeric = !isNaN(q) && q.trim() !== "";
    let query = `vorname.ilike.%${q}%`;
    if (isNumeric) {
        query += `,mitgliedsnummer.eq.${q}`;
    }

    const { data, error } = await supabase.from('mitglieder').select('*').or(query).limit(5);

    if(error) return;

    let html = '';
    data.forEach(m => {
        html += `
            <button onclick="selectM('${m.id}', '${m.vorname} ${m.nachname_initial}.')" class="active-scale w-full text-left bg-slate-50 p-6 rounded-2xl font-black text-tcr-blue border-l-[10px] border-tcr-blue text-2xl shadow-sm mb-2 flex justify-between items-center">
                <div class="text-left">
                    <span class="text-xs text-slate-400 block uppercase">Nr. ${m.mitgliedsnummer}</span>
                    <span>${m.vorname} ${m.nachname_initial}.</span>
                </div>
                <span class="bg-tcr-blue text-white px-4 py-2 rounded-xl text-sm uppercase">Wählen</span>
            </button>`;
    });
    
    if(data.length === 0) {
        html = '<p class="text-slate-400 p-4 font-bold text-center">Kein Mitglied gefunden.</p>';
    }
    document.getElementById('results').innerHTML = html;
}

// 2. GETRÄNKE-AUSWAHL
async function selectM(id, name) {
    selectedMemberId = id;
    selectedMemberName = name;
    document.getElementById('sub-content').innerHTML = `
        <h2 class="text-3xl font-black text-tcr-blue mb-1 uppercase tracking-tighter text-left">Auswahl</h2>
        <p class="text-slate-400 font-bold mb-8 uppercase text-xs tracking-widest text-left">Konto: <span class="text-tcr-blue">${name}</span></p>
        <div id="pList" class="grid grid-cols-2 gap-5"></div>
    `;
    const { data } = await supabase.from('produkte').select('*');
    let pBtn = '';
    data.forEach(p => {
        pBtn += `
            <button onclick="book('${p.name}', ${p.preis})" class="active-scale bg-white border-2 border-slate-100 p-6 rounded-[35px] flex flex-col items-center shadow-lg transition-all">
                <span class="text-6xl mb-3">${p.emoji || '🥤'}</span>
                <span class="font-black text-sm text-slate-600 uppercase tracking-tight text-center">${p.name}</span>
                <span class="bg-tcr-blue text-white px-4 py-1 rounded-full font-black text-lg mt-3">${Number(p.preis).toFixed(2)}€</span>
            </button>`;
    });
    document.getElementById('pList').innerHTML = pBtn;
}

// 3. BUCHUNG DURCHFÜHREN
async function book(item, price) {
    const { error } = await supabase.from('buchungen').insert([{ 
        mitglied_id: selectedMemberId, 
        gast_name: selectedMemberId ? null : selectedMemberName,
        artikel: item, preis: price 
    }]);
    
    if(!error) { 
        document.getElementById('sub-content').innerHTML = `
            <div class="h-full flex flex-col items-center justify-center text-center">
                <span class="text-8xl mb-4">✅</span>
                <h2 class="text-4xl font-black text-tcr-blue uppercase">Gebucht!</h2>
                <p class="text-slate-500 mt-2 font-bold">${item} für ${selectedMemberName}</p>
            </div>`;
        setTimeout(() => location.reload(), 2000);
    } else {
        alert("Fehler bei der Buchung: " + error.message);
    }
}

// 4. FORMULAR (NACHRICHT / UPDATE)
function openForm(type) {
    document.getElementById('screen-home').classList.add('hidden');
    document.getElementById('screen-sub').classList.remove('hidden');
    const isUpdate = type === 'UPDATE';
    document.getElementById('sub-content').innerHTML = `
        <h2 class="text-3xl font-black text-tcr-blue mb-6 uppercase tracking-tighter text-left">${isUpdate ? 'Daten Änderung' : 'Nachricht'}</h2>
        <input type="text" id="fName" placeholder="Dein Name" class="w-full p-6 bg-slate-100 border-2 border-slate-200 rounded-2xl mb-4 outline-none focus:border-tcr-blue text-xl font-bold shadow-inner text-slate-900">
        <textarea id="fText" placeholder="${isUpdate ? 'Was hat sich geändert?' : 'Nachricht an den Vorstand...'}" class="w-full p-6 bg-slate-100 border-2 border-slate-200 rounded-2xl h-48 mb-6 outline-none focus:border-tcr-blue text-xl font-bold shadow-inner text-slate-900"></textarea>
        <button onclick="sendCom('${type}')" class="w-full bg-tcr-blue text-white p-7 rounded-[30px] font-black text-2xl shadow-2xl active-scale border-b-8 border-tcr-yellow uppercase tracking-tighter">Absenden</button>
    `;
}

async function sendCom(type) {
    const n = document.getElementById('fName').value;
    const t = document.getElementById('fText').value;
    if(!t) return;
    const { error } = await supabase.from('kommunikation').insert([{ typ: type, inhalt: t, absender: n }]);
    if(!error) { 
        document.getElementById('sub-content').innerHTML = `
            <div class="h-full flex flex-col items-center justify-center text-center">
                <span class="text-8xl mb-4">🚀</span>
                <h2 class="text-4xl font-black text-tcr-blue uppercase">Gesendet!</h2>
                <p class="text-slate-500 mt-2 font-bold">Vielen Dank für deine Nachricht.</p>
            </div>`;
        setTimeout(() => location.reload(), 2500);
    }
}
</script>
</body>
</html>
