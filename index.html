<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TC Roßbach - Terminal Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --tcr-blue: #0f2d52; }
        body { background-color: #0f172a; font-family: sans-serif; color: #1e293b; }
        .active-scale:active { transform: scale(0.98); transition: 0.1s; }
        .input-field { width: 100%; padding: 0.8rem; background: #f8fafc; border-radius: 0.75rem; font-weight: bold; border: 2px solid #e2e8f0; outline: none; }
    </style>
</head>
<body class="min-h-screen flex flex-col p-4 items-center">

<script>
    const supabaseClient = supabase.createClient("https://pincsrqnlikcalxofztq.supabase.co", "sb_publishable_AiIuTquIjZaBGvZnki6OpQ_ggfsyg8q");
</script>

<div id="app-container" class="bg-white rounded-[40px] shadow-2xl flex flex-col overflow-hidden max-w-xl w-full min-h-[700px]">
    
    <div class="p-6 flex flex-col items-center bg-slate-50 border-b">
        <img src="Vereins-Logo.png" class="h-20 mb-2 cursor-pointer" onclick="location.reload()">
        <div class="font-black text-[#0f2d52] uppercase text-[10px] tracking-[0.3em]">TC Roßbach Terminal</div>
    </div>

    <div id="view" class="flex-grow overflow-y-auto p-6"></div>
</div>

<script>
let cart = [];
let settlementMembers = []; // Liste für Mehrfachauswahl beim Bezahlen

function showHome() {
    settlementMembers = [];
    cart = [];
    document.getElementById('view').innerHTML = `
        <div class="flex flex-col gap-3">
            <button onclick="viewMemberSearch('book')" class="active-scale p-6 bg-blue-600 text-white rounded-2xl flex items-center justify-between shadow-lg">
                <div class="flex items-center gap-4"><span class="text-3xl">🍺</span><span class="font-black uppercase">Getränke buchen</span></div>
            </button>
            <button onclick="viewMemberSearch('pay')" class="active-scale p-6 bg-green-600 text-white rounded-2xl flex items-center justify-between shadow-lg">
                <div class="flex items-center gap-4"><span class="text-3xl">💰</span><span class="font-black uppercase">Abrechnung</span></div>
            </button>
            <button onclick="viewFormUpdate()" class="active-scale p-5 bg-slate-100 text-slate-700 rounded-2xl flex items-center gap-4 border">
                <span class="text-2xl">📝</span><span class="font-black uppercase text-sm">Stammdaten Update</span>
            </button>
            <button onclick="viewFormNew()" class="active-scale p-5 bg-slate-100 text-slate-700 rounded-2xl flex items-center gap-4 border">
                <span class="text-2xl">🎾</span><span class="font-black uppercase text-sm">Mitgliedsantrag</span>
            </button>
            <button onclick="viewMessage()" class="active-scale p-5 bg-slate-100 text-slate-700 rounded-2xl flex items-center gap-4 border">
                <span class="text-2xl">📩</span><span class="font-black uppercase text-sm">Mitteilung</span>
            </button>
        </div>
    `;
}

// --- SUCHE (Mit Unterstützung für Mehrfachauswahl bei 'pay') ---
function viewMemberSearch(mode) {
    document.getElementById('view').innerHTML = `
        <button onclick="showHome()" class="text-[10px] font-bold text-slate-400 mb-4 uppercase">← Abbrechen</button>
        <h2 class="text-xl font-black text-[#0f2d52] mb-4 uppercase">${mode === 'pay' ? 'Personen auswählen' : 'Wer bucht?'}</h2>
        
        ${mode === 'pay' ? '<div id="selected-list" class="flex flex-wrap gap-2 mb-4"></div>' : ''}
        
        <input type="text" id="mSearch" oninput="runSearch(this.value, '${mode}')" placeholder="Name oder Nr." class="input-field text-xl mb-4">
        <div id="search-results" class="space-y-2 mb-6"></div>
        
        ${mode === 'pay' ? `<button id="btn-final-pay" onclick="viewSettlement()" class="hidden w-full bg-green-600 text-white p-4 rounded-xl font-black uppercase shadow-lg">Auswahl abrechnen</button>` : ''}
    `;
    updateSelectedList();
}

async function runSearch(q, mode) {
    if(q.length < 1) return;
    const { data } = await supabaseClient.from('mitglieder').select('*').or(`mitgliedsnummer.eq.${q},vorname.ilike.%${q}%`).limit(5);
    document.getElementById('search-results').innerHTML = data.map(m => `
        <button onclick="addMemberToSelection(${JSON.stringify(m).replace(/"/g, '&quot;')}, '${mode}')" class="w-full p-4 bg-slate-50 border rounded-xl flex justify-between items-center active-scale font-bold uppercase text-xs">
            ${m.vorname} ${m.nachname_initial} (${m.mitgliedsnummer}) <span class="text-blue-500 font-black">+</span>
        </button>
    `).join('');
}

function addMemberToSelection(m, mode) {
    if(mode === 'book') {
        currentMember = m;
        viewBooking();
    } else {
        if(!settlementMembers.find(sm => sm.id === m.id)) {
            settlementMembers.push(m);
            document.getElementById('mSearch').value = "";
            document.getElementById('search-results').innerHTML = "";
            updateSelectedList();
        }
    }
}

function updateSelectedList() {
    const list = document.getElementById('selected-list');
    if(!list) return;
    list.innerHTML = settlementMembers.map((m, idx) => `
        <span class="bg-blue-100 text-blue-800 px-3 py-1 rounded-full text-[10px] font-black flex items-center gap-2 uppercase">
            ${m.vorname} <button onclick="settlementMembers.splice(${idx},1); updateSelectedList();" class="text-red-500 text-lg">×</button>
        </span>
    `).join('');
    document.getElementById('btn-final-pay').classList.toggle('hidden', settlementMembers.length === 0);
}

// --- BUCHUNG (Mit Minus-Korrektur) ---
async function viewBooking() {
    const { data: prods } = await supabaseClient.from('produkte').select('*');
    document.getElementById('view').innerHTML = `
        <div class="flex justify-between items-center mb-4"><h2 class="font-black uppercase text-[#0f2d52]">Produkte</h2><span class="text-[10px] font-bold bg-blue-100 px-3 py-1 rounded-full uppercase">${currentMember.vorname}</span></div>
        <div class="grid grid-cols-2 gap-2 mb-6">
            ${prods.map(p => `
                <button onclick="addToCart('${p.name}', ${p.preis}, '${p.emoji}')" class="active-scale bg-slate-50 p-4 rounded-2xl border flex flex-col items-center">
                    <span class="text-3xl">${p.emoji}</span>
                    <span class="font-bold text-[9px] uppercase mt-1">${p.name}</span>
                    <span class="font-black text-blue-900">${p.preis.toFixed(2)}€</span>
                </button>
            `).join('')}
        </div>
        <div id="cart-box" class="hidden border-t pt-4">
            <div id="cart-items" class="space-y-2 mb-4"></div>
            <button onclick="saveBooking()" class="w-full bg-[#0f2d52] text-white p-4 rounded-xl font-black uppercase shadow-lg">Jetzt buchen</button>
        </div>
    `;
}

function addToCart(n, p, e) {
    if(n) {
        const item = cart.find(i => i.name === n);
        if(item) item.count++; else cart.push({name:n, preis:p, emoji:e, count:1});
    }
    const box = document.getElementById('cart-box');
    box.classList.remove('hidden');
    document.getElementById('cart-items').innerHTML = cart.map((i, idx) => `
        <div class="flex justify-between items-center bg-slate-50 p-2 rounded-lg text-xs font-bold uppercase border">
            <span>${i.emoji} ${i.name}</span>
            <div class="flex items-center gap-4">
                <button onclick="changeQty(${idx},-1)" class="w-8 h-8 bg-white border rounded-full text-xl shadow-sm">-</button>
                <span class="font-black w-4 text-center">${i.count}</span>
                <button onclick="changeQty(${idx},1)" class="w-8 h-8 bg-[#0f2d52] text-white rounded-full text-xl shadow-sm">+</button>
            </div>
        </div>
    `).join('');
    if(cart.length === 0) box.classList.add('hidden');
}

function changeQty(idx, d) {
    cart[idx].count += d;
    if(cart[idx].count <= 0) cart.splice(idx,1);
    addToCart(); // Refresh
}

async function saveBooking() {
    for(const i of cart) {
        for(let n=0; n<i.count; n++) {
            await supabaseClient.from('buchungen').insert([{ mitglied_id: currentMember.id, artikel: i.name, preis: i.preis, bezahlt: false }]);
        }
    }
    showHome();
}

// --- ABRECHNUNG (Mehrere Mitglieder) ---

    const ids = settlementMembers.map(m => m.id);
    const { data: open } = await supabaseClient.from('buchungen').select('*').in('mitglied_id', ids).eq('bezahlt', false);
    const sum = open.reduce((s, i) =>
