<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TC Roßbach - Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --tcr-blue-dark: #0f2d52; --tcr-blue-light: #1d4e89; --tcr-yellow: #d9ff00; }
        body { background-color: var(--tcr-blue-dark); color: white; font-family: sans-serif; }
        .bg-tcr-blue { background-color: var(--tcr-blue-light); }
    </style>
</head>
<body class="h-screen flex flex-col items-center justify-center p-6">

    <div id="status-dot" class="fixed top-4 right-4 w-4 h-4 rounded-full bg-gray-500 border border-white shadow-lg"></div>

    <div id="main-ui" class="text-center w-full max-w-md">
        <div class="bg-white p-8 rounded-[40px] mb-8 shadow-2xl">
            <img src="Vereins-Logo.png" class="h-32 mx-auto">
        </div>
        
        <div id="conn-msg" class="mb-4 text-xs font-bold uppercase tracking-widest opacity-50 text-yellow-400">Prüfe Verbindung...</div>

        <button onclick="openDrinks()" id="btn-start" disabled class="w-full bg-white text-slate-900 p-8 rounded-3xl font-black text-2xl shadow-xl opacity-30">
            GETRÄNKE BUCHEN
        </button>
        
        <p id="error-log" class="mt-6 text-red-400 text-sm font-mono hidden bg-black/30 p-4 rounded-xl text-left"></p>
    </div>

<script>
    // BITTE HIER DEINE ECHTEN DATEN AUS SUPABASE EINTRAGEN
    const SB_URL = "DEINE_PROJEKT_URL_HIER"; 
    const SB_KEY = "DEIN_ANON_KEY_HIER";

    const supabase = supabase.createClient(SB_URL, SB_KEY);
    const statusDot = document.getElementById('status-dot');
    const connMsg = document.getElementById('conn-msg');
    const btnStart = document.getElementById('btn-start');
    const errorLog = document.getElementById('error-log');

    // DER TEST-CHECK
    async function checkConnection() {
        try {
            // Wir versuchen einfach mal, die Produkte zu zählen
            const { data, error } = await supabase.from('produkte').select('count', { count: 'exact' });
            
            if (error) throw error;

            // ERFOLG: Ampel auf Grün
            statusDot.className = "fixed top-4 right-4 w-4 h-4 rounded-full bg-green-500 border border-white shadow-lg";
            connMsg.innerText = "Verbindung OK ✅";
            connMsg.className = "mb-4 text-xs font-bold uppercase tracking-widest text-green-400";
            btnStart.disabled = false;
            btnStart.className = "active:scale-95 w-full bg-white text-slate-900 p-8 rounded-3xl font-black text-2xl shadow-xl transition-all";

        } catch (err) {
            // FEHLER: Ampel auf Rot
            statusDot.className = "fixed top-4 right-4 w-4 h-4 rounded-full bg-red-500 border border-white shadow-lg";
            connMsg.innerText = "Verbindung Fehlgeschlagen ❌";
            connMsg.className = "mb-4 text-xs font-bold uppercase tracking-widest text-red-500";
            errorLog.innerText = "Fehler-Details: " + err.message;
            errorLog.classList.remove('hidden');
        }
    }

    // Startet den Test sofort beim Laden
    checkConnection();

    function openDrinks() {
        // Hier kommt dann der Rest deines Codes rein, wenn der Test grün ist
        alert("Verbindung steht! Du kannst jetzt den Rest des Codes einfügen.");
    }
</script>
</body>
</html>
