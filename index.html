<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Diagnose TC Roßbach</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-[#0f2d52] text-white font-sans p-10">

    <div class="max-w-xl mx-auto bg-white/10 p-8 rounded-3xl backdrop-blur-md border border-white/20">
        <h1 class="text-2xl font-bold mb-6 uppercase tracking-tighter">System-Check</h1>
        
        <div class="space-y-4">
            <div id="step-1" class="p-4 rounded-xl bg-gray-800 border-l-4 border-gray-500">
                1. Lade Datenbank-Modul...
            </div>
            <div id="step-2" class="p-4 rounded-xl bg-gray-800 border-l-4 border-gray-500">
                2. Erstelle Verbindung...
            </div>
            <div id="step-3" class="p-4 rounded-xl bg-gray-800 border-l-4 border-gray-500">
                3. Test-Abfrage (Produkte)...
            </div>
        </div>

        <div id="final-result" class="mt-8 p-6 rounded-2xl hidden">
            </div>
    </div>

<script>
    // --- HIER DEINE DATEN EINTRAGEN ---
    const URL = "https://pincsrqnlikcalxofztq.supabase.co"; 
    const KEY = "sb_publishable_AiIuTquIjZaBGvZnki6OpQ_ggfsyg8q"; 
    // ---------------------------------

    async function runDiag() {
        const s1 = document.getElementById('step-1');
        const s2 = document.getElementById('step-2');
        const s3 = document.getElementById('step-3');
        const res = document.getElementById('final-result');

        try {
            // Schritt 1: Check ob Library geladen
            if (typeof supabase === 'undefined') {
                throw new Error("Supabase-Bibliothek konnte nicht geladen werden. Prüfe dein Internet.");
            }
            s1.className = s1.className.replace('gray-500', 'green-500') + " bg-green-900/20";
            s1.innerText = "1. Datenbank-Modul geladen ✅";

            // Schritt 2: Client erstellen
            const client = supabase.createClient(URL, KEY);
            s2.className = s2.className.replace('gray-500', 'green-500') + " bg-green-900/20";
            s2.innerText = "2. Verbindung konfiguriert ✅";

            // Schritt 3: Echte Abfrage
            const { data, error } = await client.from('produkte').select('name').limit(1);
            
            if (error) throw error;

            s3.className = s3.className.replace('gray-500', 'green-500') + " bg-green-900/20";
            s3.innerText = "3. Test-Abfrage erfolgreich ✅";

            res.className = "mt-8 p-6 rounded-2xl bg-green-500 text-white font-bold text-center";
            res.innerHTML = "ALLES BEREIT!<br><span class='font-normal text-sm'>Die Verbindung zur Datenbank steht.</span>";
            res.classList.remove('hidden');

        } catch (err) {
            res.className = "mt-8 p-6 rounded-2xl bg-red-600 text-white font-mono text-sm overflow-auto";
            res.innerHTML = "FEHLER ENTDECKT:<br><br>" + err.message;
            res.classList.remove('hidden');
            console.error(err);
        }
    }

    // Starte Diagnose nach 1 Sekunde
    setTimeout(runDiag, 1000);
</script>
</body>
</html>
