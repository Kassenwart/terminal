<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TC Roßbach - Kasse</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --tcr-blue: #0f2d52; --tcr-yellow: #d9ff00; }
        body { background-color: var(--tcr-blue); font-family: sans-serif; color: #1e293b; }
        .active-scale:active { transform: scale(0.95); transition: 0.1s; }
    </style>
</head>
<body class="h-screen flex flex-col p-4 bg-slate-900">

<script>
    const supabaseClient = supabase.createClient("https://pincsrqnlikcalxofztq.supabase.co", "sb_publishable_AiIuTquIjZaBGvZnki6OpQ_ggfsyg8q");
</script>

<div id="main-card" class="bg-white rounded-[40px] shadow-2xl flex-grow flex flex-col overflow-hidden max-w-2xl mx-auto w-full">
    
    <div class="p-6 border-b flex justify-between items-center bg-slate-50">
        <img src="Vereins-Logo.png" class="h-12">
        <div id="total-display" class="text-2xl font-black text-[#0f2d52]">0.00 €</div>
    </div>

    <div id="content" class="flex-grow overflow-y-auto p-6">
        </div>
</div>

<script>
let cart = [];
let payer = null;

// SCHRITT 1: Wer zahlt?
function start() {
    document.getElementById('content').innerHTML = `
        <h2 class="text-2xl font-black mb-4 uppercase">Wer zahlt alles?</h2>
        <input type="text" id="mSearch" oninput="search(this.value)" placeholder="Name oder Nr. eingeben..." class="w-full p-5 bg-slate-100 rounded-2xl text-xl font-bold mb-4 outline-none border-2 focus:border-[#0f2d52]">
        <div id="res" class="space-y-2"></div>
    `;
}

async function search(q) {
    if(q.length < 1) return;
    const { data } = await supabaseClient.from('mitglieder').select('*').or(`mitgliedsnummer.eq.${q},vorname.ilike.%${q}%`).limit(4);
    document.getElementById('res').innerHTML = data.map(m => `
        <button onclick="setPayer('${m.id}', '${m.vorname}')" class="w-full text-left p-4 bg-slate-50 rounded-xl border-l-8 border-[#0f2d52] font-bold uppercase">${m.vorname} (${m.mitgliedsnummer})</button>
    `).join('');
}

function setPayer(id, name) {
    payer = {id, name};
    showDrinks();
}

// SCHRITT 2: Getränke wählen
async function showDrinks() {
    const { data } = await supabaseClient.from('produkte').select('*');
    document.getElementById('content').innerHTML = `
        <div class="mb-4 text-xs font-bold text-slate-400 uppercase">Konto: ${payer.name}</div>
        <div class="grid grid-cols-2 gap-3 mb-8">
            ${data.map(p => `
                <button onclick="add('${p.name}', ${p.preis}, '${p.emoji}')" class="active-scale bg-slate-50 p-4 rounded-3xl border flex flex-col items-center">
                    <span class="text-4xl">${p.emoji}</span>
                    <span class="font-bold text-[10px] uppercase mt-2">${p.name}</span>
                    <span class="font-black text-blue-900">${p.preis.toFixed(2)}€</span>
                </button>
            `).join('')}
        </div>
        <div id="cart-area" class="space-y-2 border-t pt-4"></div>
        <button onclick="showFinal()" class="w-full bg-[#0f2d52] text-white p-5 rounded-2xl font-black mt-6 uppercase shadow-xl">Zahlung & Nachricht</button>
    `;
    updateUI();
}

function add(name, preis, emoji) {
    const item = cart.find(i => i.name === name);
    if(item) item.count++; else cart.push({name, preis, emoji, count: 1});
    updateUI();
}

function updateUI() {
    const total = cart.reduce((s, i) => s + (i.preis * i.count), 0);
    document.getElementById('total-display').innerText = total.toFixed(2) + " €";
    const area = document.getElementById('cart-area');
    if(area) area.innerHTML = cart.map((i, idx) => `
        <div class="flex justify-between items-center bg-slate-50 p-3 rounded-xl">
            <span class="font-bold text-xs">${i.emoji} ${i.name}</span>
            <div class="flex items-center gap-3">
                <button onclick="change(${idx},-1)" class="w-8 h-8 bg-white rounded-full shadow text-xl">-</button>
                <span class="font-black">${i.count}</span>
                <button onclick="change(${idx},1)" class="w-8 h-8 bg-[#0f2d52] text-white rounded-full shadow text-xl">+</button>
            </div>
        </div>
    `).join('');
}

function change(idx, d) {
    cart[idx].count += d;
    if(cart[idx].count <= 0) cart.splice(idx,1);
    updateUI();
}

// SCHRITT 3: Abschluss & Nachricht
function showFinal() {
    document.getElementById('content').innerHTML = `
        <h2 class="text-xl font-black mb-6 uppercase">Abschluss</h2>
        <div class="mb-6">
            <label class="block text-[10px] font-bold text-slate-400 uppercase mb-2">Notiz für Kassenwart (optional):</label>
            <textarea id="note" placeholder="z.B. Runde für Tisch 4 / Mit Tom und Leon..." class="w-full p-4 bg-slate-100 rounded-2xl border-none outline-none h-24 font-bold"></textarea>
        </div>
        <div class="grid grid-cols-1 gap-3">
            <button onclick="finish('Bar')" class="p-4 bg-green-50 text-green-700 rounded-2xl font-black uppercase border-2 border-green-200">💵 Bar / Kasse</button>
            <button onclick="finish('PayPal')" class="p-4 bg-blue-50 text-blue-700 rounded-2xl font-black uppercase border-2 border-blue-200">📱 PayPal</button>
        </div>
    `;
}

async function finish(art) {
    const note = document.getElementById('note').value;
    for(const i of cart) {
        for(let n=0; n<i.count; n++) {
            await supabaseClient.from('buchungen').insert([{
                mitglied_id: payer.id,
                artikel: i.name,
                preis: i.preis,
                zahlungsart: art,
                notiz: note // DIE NACHRICHT
            }]);
        }
    }
    document.getElementById('content').innerHTML = `<div class="text-center p-10 font-black text-green-600 text-2xl uppercase">✅ Gebucht!<br>Danke.</div>`;
    setTimeout(() => location.reload(), 2000);
}

start();
</script>
</body>
</html>
