<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TC Roßbach - Terminal 4.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --tcr-blue: #0f2d52; --tcr-light: #1d4e89; --tcr-yellow: #d9ff00; }
        body { user-select: none; touch-action: manipulation; background-color: var(--tcr-blue); color: #1e293b; font-family: sans-serif; }
        .bg-tcr-blue { background-color: var(--tcr-light); }
        .active-scale:active { transform: scale(0.96); transition: 0.1s; }
        .bg-gradient-main { background: radial-gradient(circle at center, #1e4b85 0%, #0a1f3d 100%); }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden bg-gradient-main">

<script>
    const SB_URL = "https://pincsrqnlikcalxofztq.supabase.co";
    const SB_KEY = "sb_publishable_AiIuTquIjZaBGvZnki6OpQ_ggfsyg8q";
    const supabaseClient = supabase.createClient(SB_URL, SB_KEY);
</script>

<div id="screen-home" class="flex-grow flex flex-col items-center justify-center p-6 text-white text-center">
    <div class="mb-8 bg-white p-6 rounded-[40px] shadow-2xl border-b-8 border-tcr-yellow">
        <img src="Vereins-Logo.png" alt="Logo" class="h-32 mx-auto">
    </div>
    
    <div class="w-full max-w-md space-y-4">
        <button onclick="openDrinks()" class="active-scale w-full bg-white text-[#0f2d52] p-8 rounded-3xl shadow-2xl flex items-center justify-between border-l-8 border-tcr-yellow">
            <span class="text-2xl font-black uppercase">🍺 Getränke buchen</span>
            <span class="text-2xl font-bold">→</span>
        </button>

        <div class="grid grid-cols-2 gap-4">
            <button onclick="alert('Update-Funktion folgt')" class="active-scale bg-white/10 border border-white/20 p-4 rounded-2xl text-xs font-bold uppercase tracking-widest">🔄 Datenupdate</button>
            <button onclick="alert('Nachricht-Funktion folgt')" class="active-scale bg-white/10 border border-white/20 p-4 rounded-2xl text-xs font-bold uppercase tracking-widest">📩 Nachricht</button>
        </div>
    </div>
</div>

<div id="screen-sub" class="hidden flex-grow flex flex-col p-4">
    <button onclick="location.reload()" class="mb-4 bg-white/20 text-white px-6 py-2 rounded-xl self-start font-bold uppercase text-xs">← Abbrechen</button>
    <div id="sub-content" class="bg-white rounded-[40px] shadow-2xl p-6 flex-grow overflow-y-auto border-t-[12px] border-[#1d4e89]"></div>
</div>

<script>
let selectedMemberId = null;
let selectedMemberName = "";
let cart = []; // Warenkorb für die Runde

function openDrinks() {
    document.getElementById('screen-home').classList.add('hidden');
    document.getElementById('screen-sub').classList.remove('hidden');
    renderMemberSearch();
}

function renderMemberSearch() {
    document.getElementById('sub-content').innerHTML = `
        <h2 class="text-2xl font-black text-[#0f2d52] mb-1 uppercase">Wer bist du?</h2>
        <input type="text" id="mSearch" oninput="searchM(this.value)" placeholder="Nummer oder Name..." class="w-full p-5 bg-slate-100 border-2 rounded-2xl text-xl font-bold mb-4 outline-none">
        <div id="results" class="space-y-2"></div>
    `;
    setTimeout(() => document.getElementById('mSearch').focus(), 200);
}

async function searchM(q) {
    const resDiv = document.getElementById('results');
    if(q.trim().length < 1) { resDiv.innerHTML = ''; return; }
    const { data } = await supabaseClient.from('mitglieder').select('*').or(`mitgliedsnummer.eq.${q},vorname.ilike.%${q}%`).limit(5);
    let html = '';
    if(data) {
        data.forEach(m => {
            html += `
                <button onclick="selectM('${m.id}', '${m.vorname} ${m.nachname_initial}')" class="active-scale w-full text-left bg-slate-50 p-4 rounded-xl border-l-[8px] border-[#0f2d52] shadow-sm flex justify-between items-center">
                    <span class="font-black text-[#0f2d52] uppercase">Nr. ${m.mitgliedsnummer} - ${m.vorname}</span>
                    <span class="text-[10px] font-bold bg-slate-200 px-2 py-1 rounded-md">WÄHLEN</span>
                </button>`;
        });
    }
    resDiv.innerHTML = html;
}

async function selectM(id, name) {
    selectedMemberId = id;
    selectedMemberName = name;
    renderDrinkMenu();
}

async function renderDrinkMenu() {
    document.getElementById('sub-content').innerHTML = `
        <div class="flex justify-between items-start mb-6">
            <div>
                <h2 class="text-xl font-black text-[#0f2d52] uppercase">Getränke</h2>
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">${selectedMemberName}</p>
            </div>
            <div id="cart-counter" class="bg-tcr-blue text-white px-4 py-2 rounded-2xl font-black shadow-lg">0 Artikel</div>
        </div>

        <div id="pList" class="grid grid-cols-2 gap-3 mb-8">Lade...</div>

        <div id="selection-area" class="border-t-2 pt-4 hidden">
            <h3 class="font-black uppercase text-xs text-slate-400 mb-3">Deine Auswahl (Runde):</h3>
            <div id="cart-list" class="space-y-2 mb-6"></div>
            <button onclick="confirmBooking()" class="w-full bg-green-500 text-white p-6 rounded-2xl font-black text-xl shadow-xl active-scale">JETZT BUCHEN</button>
        </div>
    `;
    
    const { data } = await supabaseClient.from('produkte').select('*');
    let html = '';
    data.forEach(p => {
        html += `
            <button onclick="addToCart('${p.name}', ${p.preis}, '${p.emoji || '🥤'}')" class="active-scale bg-slate-50 border-2 border-slate-100 p-4 rounded-3xl flex flex-col items-center shadow-sm">
                <span class="text-4xl mb-1">${p.emoji || '🥤'}</span>
                <span class="font-bold text-[10px] uppercase text-slate-600">${p.name}</span>
                <span class="text-[#0f2d52] font-black text-sm">${Number(p.preis).toFixed(2)}€</span>
            </button>`;
    });
    document.getElementById('pList').innerHTML = html;
}

function addToCart(name, preis, emoji) {
    const existing = cart.find(item => item.name === name);
    if(existing) {
        existing.count++;
    } else {
        cart.push({ name, preis, emoji, count: 1 });
    }
    updateCartUI();
}

function updateCartUI() {
    const list = document.getElementById('cart-list');
    const area = document.getElementById('selection-area');
    const counter = document.getElementById('cart-counter');
    
    if(cart.length > 0) area.classList.remove('hidden');
    else area.classList.add('hidden');

    let totalCount = 0;
    let html = '';
    cart.forEach((item, index) => {
        totalCount += item.count;
        html += `
            <div class="flex items-center justify-between bg-slate-50 p-3 rounded-xl border border-slate-200">
                <div class="flex items-center gap-3">
                    <span class="text-2xl">${item.emoji}</span>
                    <span class="font-bold uppercase text-xs">${item.name}</span>
                </div>
                <div class="flex items-center gap-4">
                    <button onclick="changeCount(${index}, -1)" class="w-8 h-8 bg-slate-200 rounded-full font-bold">-</button>
                    <span class="font-black text-lg w-4 text-center">${item.count}</span>
                    <button onclick="changeCount(${index}, 1)" class="w-8 h-8 bg-tcr-blue text-white rounded-full font-bold">+</button>
                </div>
            </div>`;
    });
    list.innerHTML = html;
    counter.innerText = `${totalCount} Artikel`;
}

function changeCount(index, delta) {
    cart[index].count += delta;
    if(cart[index].count <= 0) cart.splice(index, 1);
    updateCartUI();
}

async function confirmBooking() {
    document.getElementById('sub-content').innerHTML = `<div class="text-center p-10 font-bold uppercase">Wird gebucht...</div>`;
    
    // Alle Artikel aus dem Warenkorb einzeln in die Datenbank eintragen
    for (const item of cart) {
        for (let i = 0; i < item.count; i++) {
            await supabaseClient.from('buchungen').insert([{ 
                mitglied_id: selectedMemberId, 
                artikel: item.name, 
                preis: item.preis 
            }]);
        }
    }

    document.getElementById('sub-content').innerHTML = `
        <div class="h-full flex flex-col items-center justify-center text-center">
            <span class="text-8xl mb-4 animate-bounce">🍻</span>
            <h2 class="text-4xl font-black text-[#0f2d52] uppercase text-green-500">Runde gebucht!</h2>
            <p class="text-slate-500 mt-2 font-bold uppercase text-xs">Viel Spaß, ${selectedMemberName}!</p>
        </div>`;
    
    setTimeout(() => location.reload(), 3000);
}
</script>
</body>
</html>
